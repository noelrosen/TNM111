<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>TNM111 Lab 4, 2026</title>
        <link rel="stylesheet" href="libs/css/index.css" />
        <link href="https://fonts.cdnfonts.com/css/star-wars" rel="stylesheet">
    </head>

    <body class="body">
        <div class="starfield">
            <div class="container-main">
                <div class="title">
                    <h2>Star Wars<br>Social Network</h2>
                </div>
                <div class="container-views">
                    <div id="view1" class="view"></div>
                        <div class="starfield-origin">
                            <div class="container-filters">
                                <div class="filter-column">
                                    <h4>View 1<br>Episodes:</h4>
                                    <div class="checkbox-row"><input type="checkbox" class="filter1" value="all" checked><span>All</span></div>
                                    <div class="checkbox-row"><input type="checkbox" class="filter1" value="1" checked><span>Episode 1</span></div>
                                    <div class="checkbox-row"><input type="checkbox" class="filter1" value="2" checked><span>Episode 2</span></div>
                                    <div class="checkbox-row"><input type="checkbox" class="filter1" value="3" checked><span>Episode 3</span></div>
                                    <div class="checkbox-row"><input type="checkbox" class="filter1" value="4" checked><span>Episode 4</span></div>
                                    <div class="checkbox-row"><input type="checkbox" class="filter1" value="5" checked><span>Episode 5</span></div>
                                    <div class="checkbox-row"><input type="checkbox" class="filter1" value="6" checked><span>Episode 6</span></div>
                                    <div class="checkbox-row"><input type="checkbox" class="filter1" value="7" checked><span>Episode 7</span></div>
                                </div>

                                <div class="filter-column">
                                    <h4>View 2<br>Episodes:</h4>
                                    <div class="checkbox-row"><input type="checkbox" class="filter2" value="all" checked><span>All</span></div>
                                    <div class="checkbox-row"><input type="checkbox" class="filter2" value="1" checked><span>Episode 1</span></div>
                                    <div class="checkbox-row"><input type="checkbox" class="filter2" value="2" checked><span>Episode 2</span></div>
                                    <div class="checkbox-row"><input type="checkbox" class="filter2" value="3" checked><span>Episode 3</span></div>
                                    <div class="checkbox-row"><input type="checkbox" class="filter2" value="4" checked><span>Episode 4</span></div>
                                    <div class="checkbox-row"><input type="checkbox" class="filter2" value="5" checked><span>Episode 5</span></div>
                                    <div class="checkbox-row"><input type="checkbox" class="filter2" value="6" checked><span>Episode 6</span></div>
                                    <div class="checkbox-row"><input type="checkbox" class="filter2" value="7" checked><span>Episode 7</span></div>
                                </div>
                            </div>
                        </div>
                    <div id="view2" class="view"></div>
                </div>
            </div>
        </div>
        <script src="js/starfield.js"></script>
        <script>
            Starfield.setup({
                // Number of stars
                numStars: 250,
                // Base speed of stars (influences acceleration)
                baseSpeed: 2,
                // Length of star trail (0-1)
                trailLength: 0.8, 
                // Color of stars (RGB format)
                starColor: 'rgb(255, 255, 255)', 
                // Canvas background color (RGB format)
                canvasColor: 'rgb(0, 0, 0)', 
                // Maximum hue variation in degrees (0-360)
                hueJitter: 0,    
                // Maximum acceleration   
                maxAcceleration: 1, 
                // Rate of acceleration         
                accelerationRate: 0.1, 
                // Rate of deceleration   
                decelerationRate: 0.2, 
                // Minimum spawn distance from origin       
                minSpawnRadius: 80, 
                // Maximum spawn distance from origin       
                maxSpawnRadius: 500,   
                // Use automatic origin detection  
                auto: true,  
                // Manual origin X (container width / 2 if not set)               
                originX: null, 
                // Manual origin Y (container height / 2 if not set)
                originY: null, 
                // Container element selector         
                container: null, 
                // Origin element selector            
                originElement: null 
                            
            });
        </script>
    </body>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="js/main2.js"></script>
</html>
